services:
  database:
    image: postgres:15-alpine
    container_name: restaurant_api_database
    environment:
      POSTGRES_USER: legacytales
      POSTGRES_PASSWORD: Punyaku1337
      POSTGRES_DB: restaurants
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: restaurant_api_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
